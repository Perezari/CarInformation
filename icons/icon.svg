<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Veritas">
  <defs>
    <linearGradient id="goldBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#fad377"/>
      <stop offset="50%"  stop-color="#f0c040"/>
      <stop offset="100%" stop-color="#e8a825"/>
    </linearGradient>
  </defs>

  <!-- Rounded square gold background -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#goldBg)"/>

  <!-- Gearshift H-pattern in dark, centered -->
  <g fill="none" stroke="#0a0c10" stroke-width="42"
     stroke-linecap="round" stroke-linejoin="round">
    <line x1="128" y1="256" x2="384" y2="256"/>
    <line x1="128" y1="156" x2="128" y2="356"/>
    <line x1="256" y1="156" x2="256" y2="356"/>
    <line x1="384" y1="156" x2="384" y2="356"/>
  </g>
</svg>
